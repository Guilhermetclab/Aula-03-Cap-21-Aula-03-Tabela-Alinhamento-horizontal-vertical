<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito - Alinhamento em Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }

                /* Alinhamento horizontal 
                - center - centro
                - left - esquerda
                - right - direita

                /* Alinhamento vertical
                - top - em cima
                - bottom - em baixo
                - middle - no centro;*/

        td{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        td.a1esquerda{
            border: 1px solid black;
            padding: 8px; 
            text-align: left;
            vertical-align: middle;
        }

        td.b1centro{
            border: 1px solid black;
            padding: 8px;
            text-align: center;       
            vertical-align: middle;
        }

        td.c1direita{
            border: 1px solid black;
            padding: 8px;          
            text-align: right;
            vertical-align: middle;

        }
        td.a2topo{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: top;
        }

        td.c2baixo{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: bottom;

        }



        /* 
        ================================
        TAREFA 1: ALINHAMENTO HORIZONTAL
        - Crie uma classe .direita para alinhar o texto à direita
        - Crie uma classe .esquerda para alinhar o texto à esquerda
        - Aplique essas classes em células diferentes
        ================================
        */

        /* 
        ================================
        TAREFA 2: ALINHAMENTO VERTICAL
        - Crie uma classe .topo para alinhar o texto no topo
        - Crie uma classe .baixo para alinhar o texto na parte de baixo
        - Aplique em células da segunda e terceira linha
        ================================
        */

        /* 
        ================================
        TAREFA 3: DESAFIO EXTRA
        - Aumente a altura de uma das linhas da tabela (ex: height: 100px;)
        - Coloque um número em uma célula e alinhe-o à direita
        ================================
        */
    </style>
</head>

<body>
    <h1>Exercício - Trabalhando com alinhamento</h1>

    <table>
        <tr>
            <!-- Primeira linha -->
            <td class="a1esquerda">A1</td>
            <td class="b1centro">B1</td>
            <td class="c1direita">C1</td>
        </tr>
        <tr>
            <!-- Segunda linha -->
            <td class="a2topo">A2</td>
                <td>B2</td>
                <td class="c2baixo">C2</td>
        </tr>
        <tr>
            <!-- Terceira linha -->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <!-- Quarta linha -->
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>

</body>

</html>

</head>

<body>
    <h1>Gabarito - Trabalhando com alinhamento</h1>


</body>

</html>
